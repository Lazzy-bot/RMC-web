services:
  rmc-assistant:
    build: .
    container_name: rmc-assistant-v4
    restart: unless-stopped
    # Không cần expose port ra máy host nữa vì Ngrok sẽ truy cập trực tiếp
    # ports:
    #   - "5000:5000"
    volumes:
      # Mount thư mục data từ máy host vào container.
      # Có thể override bằng biến DATA_DIR trong file .env (ví dụ máy B).
      - "${DATA_DIR:-C:/RMC_Assistant_ver2.0}:/data"
    environment:
      # Override đường dẫn data về /data trong container
      - RMC_BASE_DIR=/data
      # Auth app/session
      - APP_SECRET_KEY=${APP_SECRET_KEY:-change-me-in-env}
      - ADMIN_EMAILS=${ADMIN_EMAILS:-}
      - PUBLIC_BASE_URL=${PUBLIC_BASE_URL:-}

      # OAuth login providers (Microsoft / Google)
      - MS_OAUTH_CLIENT_ID=${MS_OAUTH_CLIENT_ID:-}
      - MS_OAUTH_CLIENT_SECRET=${MS_OAUTH_CLIENT_SECRET:-}
      - MS_OAUTH_TENANT_ID=${MS_OAUTH_TENANT_ID:-}
      - GOOGLE_OAUTH_CLIENT_ID=${GOOGLE_OAUTH_CLIENT_ID:-}
      - GOOGLE_OAUTH_CLIENT_SECRET=${GOOGLE_OAUTH_CLIENT_SECRET:-}

      # Slack webhooks by site key
      - SLACK_WEBHOOK_DEFAULT=${SLACK_WEBHOOK_DEFAULT:-}
      - SLACK_WEBHOOK_ABDNC=${SLACK_WEBHOOK_ABDNC:-}
      - SLACK_WEBHOOK_AMDR=${SLACK_WEBHOOK_AMDR:-}
      - SLACK_WEBHOOK_ANVL=${SLACK_WEBHOOK_ANVL:-}
      - SLACK_WEBHOOK_ATQB=${SLACK_WEBHOOK_ATQB:-}
      - SLACK_WEBHOOK_AVG=${SLACK_WEBHOOK_AVG:-}
      # Azure AD (tuỳ chọn — nếu muốn override)
      # - AZURE_CLIENT_ID=ac4edccf-a8ee-41aa-bcc4-6603c4bebae1
      # - AZURE_TENANT_ID=5983a1d2-f46b-492d-a9b3-7e2f3609d20b
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/auth/status')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  ngrok:
    image: ngrok/ngrok:latest
    restart: unless-stopped
    container_name: ngrok-tunnel
    command: http --url=balance-rotting-blooming.ngrok-free.dev rmc-assistant:5000
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    ports:
      - "4040:4040" # Port để xem giao diện web của Ngrok
