services:
  rmc-assistant:
    build: .
    container_name: rmc-assistant-v4
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      # Mount thư mục data từ máy host vào container.
      # Có thể override bằng biến DATA_DIR trong file .env (ví dụ máy B).
      - "${DATA_DIR:-C:/RMC_Assistant_ver2.0}:/data"
    environment:
      # Override đường dẫn data về /data trong container
      - RMC_BASE_DIR=/data
      # Auth app/session
      - APP_SECRET_KEY=${APP_SECRET_KEY:-change-me-in-env}
      - ADMIN_EMAILS=${ADMIN_EMAILS:-}
      - PUBLIC_BASE_URL=${PUBLIC_BASE_URL:-}

      # OAuth login providers (Microsoft / Google)
      - MS_OAUTH_CLIENT_ID=${MS_OAUTH_CLIENT_ID:-}
      - MS_OAUTH_CLIENT_SECRET=${MS_OAUTH_CLIENT_SECRET:-}
      - MS_OAUTH_TENANT_ID=${MS_OAUTH_TENANT_ID:-}
      - GOOGLE_OAUTH_CLIENT_ID=${GOOGLE_OAUTH_CLIENT_ID:-}
      - GOOGLE_OAUTH_CLIENT_SECRET=${GOOGLE_OAUTH_CLIENT_SECRET:-}



      # Rate limiting — tắt khi debug local, bật khi production
      - RATE_LIMIT_ENABLED=${RATE_LIMIT_ENABLED:-true}

      # FIX #2: Tăng giới hạn API để tránh bị block khi polling + nhiều người dùng
      - RATE_LIMIT_API_MAX=200
      - RATE_LIMIT_API_PERIOD=60
      - RATE_LIMIT_API_BLOCK=30
      - RATE_LIMIT_USER_MAX=400
      - RATE_LIMIT_HEAVY_MAX=20
      - RATE_LIMIT_HEAVY_PERIOD=60
      - RATE_LIMIT_HEAVY_BLOCK=60

    # FIX #3: Tăng RAM limit từ 512m → 1g (MSAL + openpyxl + Excel data = dễ OOM)
    mem_limit: 1g
    mem_reservation: 512m

    # FIX #4: Healthcheck dùng đúng endpoint public (không cần auth),
    #         tăng timeout và start_period để container kịp khởi động
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request, sys; \
              r = urllib.request.urlopen('http://localhost:5000/api/auth/providers', timeout=10); \
              sys.exit(0 if r.status == 200 else 1)"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 30s

  ngrok:
    image: ngrok/ngrok:latest
    # FIX #5: Dùng on-failure:5 thay on-failure để có giới hạn retry, tránh loop vô hạn
    restart: on-failure:5
    container_name: ngrok-tunnel
    # FIX #6: Chạy ngrok qua http với domain tĩnh
    command: >
      http
      --url=balance-rotting-blooming.ngrok-free.dev
      rmc-assistant:5000
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    depends_on:
      rmc-assistant:
        condition: service_healthy
    ports:
      - "4040:4040"
