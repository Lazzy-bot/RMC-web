    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
      <div class="form-group">
        <label>Loại lỗi (Type)</label>
        <select id="status-alarm-type" class="status-field" disabled>
          <option value="Operation">Operation</option>
          <option value="Device">Device</option>
          <option value="System">System</option>
          <option value="External">External</option>
        </select>
      </div>
      <div class="form-group">
        <label>Mức độ (Level)</label>
        <select id="status-alarm-level" class="status-field" disabled>
          <option value="High">High</option>
          <option value="Medium">Medium</option>
          <option value="Low">Low</option>
        </select>
      </div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
      <div class="form-group">
        <label>Tuần (Week)</label>
        <select id="status-week" class="status-field" disabled>
          <option value="Week 1">Week 1</option>
          <option value="Week 2">Week 2</option>
          <option value="Week 3">Week 3</option>
          <option value="Week 4">Week 4</option>
          <option value="Week 5">Week 5</option>
        </select>
      </div>
      <div class="form-group">
        <label>Xác nhận (Done)</label>
        <select id="status-done" class="status-field" disabled>
          <option value="Done">Done</option>
          <option value="Pending">Pending</option>
        </select>
      </div>
    </div>

    <div class="form-group">
      <label>Mô tả (Reason)</label>
      <textarea id="status-desc" class="status-field" disabled placeholder="Mô tả chi tiết kết quả xử lý..."></textarea>
    </div>
